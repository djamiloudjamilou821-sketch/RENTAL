<!DOCTYPE html>
<html>
<head>
    <title>Debt Timeline</title>
    <link rel="stylesheet" href="/static/style.css">
<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 320px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #1f4fff;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #1740cc;
}

.password-box {
    position: relative;
}

.eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
}
</style>

</head>
<body>

<div class="profile-container">

    <h2>📊 Debt Timeline - {{ renter[1] }}</h2>

    <a href="/renter/{{ renter[0] }}"> 
        <button style="margin-top:10px; padding:10px; background:#2c3e50; color:white; border:none; border-radius:5px;">
            ⬅ Back to Profile
        </button>
    </a>

    <hr>

    {% for t in timeline %}

        <div style="padding:10px; margin:10px 0; border-radius:8px;
            background:#f5f5f5;">

            <p><strong>Week {{ t.week }}</strong></p>
            <p>Start: {{ t.start }}</p>

            {% if t.status == "PAID" %}
                <p style="color:green;">✔ PAID ({{ t.paid }} CFA)</p>
            {% else %}
                <p style="color:red;">❌ DEBT ({{ t.paid }} CFA paid)</p>
            {% endif %}

        </div>

    {% endfor %}

</div>

</body>
</html>
