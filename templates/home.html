<!DOCTYPE html>
<html>
<head>
    <title>Rental System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .hero {
            background: linear-gradient(135deg, #1f4fff, #4facfe);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .hero h1 {
            margin: 0;
            font-size: 28px;
        }

        .hero p {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: white;
            color: #1f4fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .section {
            padding: 20px;
            text-align: center;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 15px;
        }

        .feature {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (min-width: 768px) {
            .features {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>

    <div class="hero">
            <h1>🏠 Rental Management System</h1>
            <p>Manage renters, payments, and income easily</p>

            <a href="/dashboard" class="btn">🚀 Go to Dashboard</a>
        </div>

        <div class="section">
            <h2>Why Use This System?</h2>

            <div class="features">

                <div class="feature">
                    <h3>📊 Smart Dashboard</h3>
                    <p>Track renters, payments, and overdue easily</p>
                </div>

                <div class="feature">
                    <h3>💰 Money Tracking</h3>
                    <p>Know exactly how much you earn weekly</p>
                </div>

                <div class="feature">
                    <h3>📱 Mobile Friendly</h3>
                    <p>Access your system from any device</p>
                </div>

            </div>
        </div>
    


</body>
</html>
