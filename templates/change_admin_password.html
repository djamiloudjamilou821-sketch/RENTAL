<!DOCTYPE html>
<html>
<head>
    <title>Change Admin Password</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="profile-container">

    <h2>Change Admin Password</h2>

    <form method="POST">

        <div style="position:relative;">

            <input type="password" id="oldPassword" name="old_password"
                placeholder="Old password" required
                style="width:100%; padding-right:40px;">

            <span onclick="togglePassword()"
                style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                cursor:pointer;">
                👁
            </span>

        </div>

        <div style="position:relative;">

            <input type="password" id="newPassword" name="new_password"
                placeholder="New password" required
                style="width:100%; padding-right:40px;">

            <span onclick="togglePassword()"
                style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                cursor:pointer;">
                👁
            </span>

        </div>

        <button type="submit">Update Password</button>

         <a href="/renters" style="display:inline-block; margin-bottom:10px;  margin-left:10px;
        background:#2c3e50; color:white; padding:8px 12px;
        border-radius:6px; text-decoration:none;">
        Cancel
        </a>

    </form>

</div>
<script>
function togglePassword() {
    var input1 = document.getElementById("newPassword");
    var input2 = document.getElementById("oldPassword");

    if (input1.type === "password") {
        input1.type = "text";
        if (input2) input2.type = "text";
    } else {
        input1.type = "password";
        if (input2) input2.type = "password";
    }
}
</script>
</body>
</html>
