<!DOCTYPE html>
<html>
<head>
    <title>Change Admin Password</title>
    <link rel="stylesheet" href="/static/style.css">
<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 320px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #1f4fff;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #1740cc;
}

.password-box {
    position: relative;
}

.eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
}
</style>

</head>
<body>

<div class="profile-container">

    <h2>Change Admin Password</h2>

    <form method="POST">

        <div style="position:relative;">

            <input type="password" id="oldPassword" name="old_password"
                placeholder="Old password" required
                style="width:100%; padding-right:40px;">

            <span onclick="togglePassword()"
                style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                cursor:pointer;">
                👁
            </span>

        </div>

        <div style="position:relative;">

            <input type="password" id="newPassword" name="new_password"
                placeholder="New password" required
                style="width:100%; padding-right:40px;">

            <span onclick="togglePassword()"
                style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                cursor:pointer;">
                👁
            </span>

        </div>

        <button type="submit">Update Password</button>

         <a href="/renters" style="display:inline-block; margin-bottom:10px;  margin-left:10px;
        background:#2c3e50; color:white; padding:8px 12px;
        border-radius:6px; text-decoration:none;">
        Cancel
        </a>

    </form>

</div>
<script>
function togglePassword() {
    var input1 = document.getElementById("newPassword");
    var input2 = document.getElementById("oldPassword");

    if (input1.type === "password") {
        input1.type = "text";
        if (input2) input2.type = "text";
    } else {
        input1.type = "password";
        if (input2) input2.type = "password";
    }
}
</script>
</body>
</html>
