<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 5px rgba(42,82,152,0.5);
        }

        .eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

    </style>
</head>

<body>
<div class="profile-container">

    <div class="card">

        <div class="title">🔒 Change Password</div>

        <form method="POST">

            <!-- NEW PASSWORD -->
            <div class="input-box">
                <input type="password" name="new_password" id="new_password" placeholder="New Password">
                <span class="eye" onclick="toggle('new_password')">👁️</span>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="input-box">
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password">
                <span class="eye" onclick="toggle('confirm_password')">👁️</span>
            </div>

            <button type="submit">Update Password</button>


             <a href="/renters" style="display:inline-block; margin-bottom:10px;  margin-left:10px;
            background:#2c3e50; color:white; padding:8px 12px;
            border-radius:6px; text-decoration:none;">
            Cancel
            </a>

        </form>

    </div>

    <script>
    function toggle(id) {
        let input = document.getElementById(id);

        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }
    </script>
</div>
</body>
</html>
