<!DOCTYPE html>
<html>
<head>
    <title>Add Payment</title>
    <link rel="stylesheet" href="/static/style.css">
<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 320px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #1f4fff;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #1740cc;
}
</style>

</head>
<body>

<div class="profile-container">

    <h2>Add Payment</h2>

    <!-- FIXED AMOUNT -->
    <p><strong>Amount:</strong> 1000 CFA</p>

    <!-- DEBT INFO -->
    {% if debt > 0 %}
        <p style="color:red;">
            ❗ You still owe {{ debt }} CFA
        </p>
    {% else %}
        <p style="color:green;">
            ✔ No debt
        </p>
    {% endif %}

    <form method="POST">

        <input type="hidden" name="amount" value="1000">

        <input type="password" name="password" placeholder="Admin password" required>

        {% if debt <= 0 and already_paid %}
            <button style="background:gray; color:white; padding:10px; border:none; border-radius:5px;" disabled>
                ✔ Already Paid This Week
            </button>
        {% else %}
            <button type="submit" style="background:green; color:white; padding:10px; border:none; border-radius:5px;">
                💳 Save Payment
            </button>
        {% endif %}

         <a href="/renters" style="display:inline-block; margin-bottom:10px;  margin-left:10px;
        background:#2c3e50; color:white; padding:8px 12px;
        border-radius:6px; text-decoration:none;">
        Cancel
        </a>

    </form>

</div>

</body>
</html>
