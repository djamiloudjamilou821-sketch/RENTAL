<!DOCTYPE html>
<html>
<head>
    <title>Add Payment</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="profile-container">

    <h2>Add Payment</h2>

    <!-- FIXED AMOUNT -->
    <p><strong>Amount:</strong> 1000 CFA</p>

    <!-- DEBT INFO -->
    {% if debt > 0 %}
        <p style="color:red;">
            ❗ You still owe {{ debt }} CFA
        </p>
    {% else %}
        <p style="color:green;">
            ✔ No debt
        </p>
    {% endif %}

    <form method="POST">

        <input type="hidden" name="amount" value="1000">

        <input type="password" name="password" placeholder="Admin password" required>

        {% if debt <= 0 and already_paid %}
            <button style="background:gray; color:white; padding:10px; border:none; border-radius:5px;" disabled>
                ✔ Already Paid This Week
            </button>
        {% else %}
            <button type="submit" style="background:green; color:white; padding:10px; border:none; border-radius:5px;">
                💳 Save Payment
            </button>
        {% endif %}

    </form>

</div>

</body>
</html>
