<!DOCTYPE html>
<html>
<head>
    <title>Verify User</title>
     <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="profile-container">
    <h2>🔐 Verify Your Identity</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required><br><br>

        <input type="password" name="password" placeholder="Current Password" required><br><br>

        <input type="password" name="confirm_password" placeholder="Confirm Password" required><br><br>

        <button type="submit">Next ➡️</button>

         <a href="/dashboard" style="display:inline-block; margin-bottom:10px;  margin-left:10px;
        background:#2c3e50; color:white; padding:8px 12px;
        border-radius:6px; text-decoration:none;">
        Cancel
        </a>
    </form>

</div>
</body>
</html>
