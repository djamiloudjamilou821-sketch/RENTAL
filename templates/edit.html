<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
     <link rel="stylesheet" href="/static/style.css">
</head>
<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 320px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #1f4fff;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #1740cc;
}


</style>

<body>
<div class="profile-container">
    <h2>Edit Renter</h2>
    <form method="POST">

        <input name="name" value="{{ renter[1] }}" required><br><br>

        <input name="phone" value="{{ renter[2] }}" required><br><br>

        <input name="address" value="{{ renter[3] }}" required><br><br>

        <input type="password" name="password" placeholder="Admin password" required><br><br>

        <button type="submit">Update</button>
        <a href="/renters" style="display:inline-block; margin-bottom:10px;  margin-left:10px;
        background:#2c3e50; color:white; padding:8px 12px;
        border-radius:6px; text-decoration:none;">
            ⬅ Cancel
        </a>
    </form>
</div>
</body>
</html>
