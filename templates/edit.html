<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
     <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="profile-container">
<form method="POST">

    <input name="name" value="{{ renter[1] }}" required><br><br>

    <input name="phone" value="{{ renter[2] }}" required><br><br>

    <input name="address" value="{{ renter[3] }}" required><br><br>

    <input name="barrow" value="{{ renter[4] }}" required><br><br>

    <br><br>
    <button type="submit">Update</button>
    <input type="password" name="password" placeholder="Admin password" required>

    <a href="/dashboard" style="display:inline-block; margin-bottom:10px;  margin-left:10px;
    background:#2c3e50; color:white; padding:8px 12px;
    border-radius:6px; text-decoration:none;">
        ⬅ Back to Dashboard
    </a>
</form>
</div>
</body>
</html>
