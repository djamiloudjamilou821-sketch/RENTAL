<!DOCTYPE html>
<html>
<head>
    <title>Money Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .green { color: green; }
        .red { color: red; }
        .blue { color: blue; }
        .orange { color: orange; }

        .big {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .back {
            display: block;
            margin-top: 30px;
            text-align: center;
        }

        .back a {
            text-decoration: none;
            padding: 10px 15px;
            background: black;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>💰 Money Dashboard</h2>

<div class="stats">

    <div class="card">
        👥 Total Renters
        <div class="big">{{ total_renters }}</div>
    </div>

    <div class="card green">
        ✔ Paid Renters
        <div class="big">{{ paid_renters }}</div>
    </div>

    <div class="card red">
        ❌ Unpaid Renters
        <div class="big">{{ unpaid_renters }}</div>
    </div>

    <div class="card blue">
        💵 Weekly Fee
        <div class="big">{{ weekly_fee }} CFA</div>
    </div>

    <div class="card green">
        💰 Collected Money
        <div class="big">{{ collected_money }} CFA</div>
    </div>

    <div class="card orange">
        📊 Expected Money
        <div class="big">{{ expected_money }} CFA</div>
    </div>

</div>

<div class="back">
    <a href="/dashboard">⬅ Back to Dashboard</a>
</div>

</body>
</html>
